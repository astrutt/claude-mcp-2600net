# ─────────────────────────────────────────────────────────────────────────────
# 2600net IRC MCP Server — Configuration
# Owner: root:claudebot   Permissions: 640
# ─────────────────────────────────────────────────────────────────────────────

[irc]
# Nick prefix for all MCP sessions (visible in nicklist and /whois)
# IRC bracket convention [ai] signals AI client status in the nicklist.
# Other options: ai-, mcp-, bot-, CL-
# NOTE: Changing this after sessions exist will orphan existing nicks —
# old sessions will reconnect with the new prefix on next connect.
nick_prefix = [ai]
# IRC server to connect users to
server    = irc.scuttled.net
tls_port  = 6697

[mcp]
# MCP server listens on localhost — Apache reverse proxies HTTPS to it
host      = 127.0.0.1
port      = 8765

# Public hostname the reverse proxy presents (used for Host header validation)
public_host = wpm.2600.chat

# CORS allowed origins for browser-based MCP clients (comma-separated)
# Only affects browser clients — desktop clients are unaffected
# Keep as claude.ai during Anthropic MCP directory audit period
# To open up later: * or comma-separated list of origins
cors_origins = https://claude.ai

[sessions]
# Hours before an idle session is disconnected (nick stays registered)
idle_timeout_hours = 4

[limits]
# Global maximum concurrent IRC sessions across all users
max_sessions_global     = 500

# Maximum concurrent sessions per user (by desired_name, pre-OAuth)
# Mirrors Anope's 1 email = 2 nicks rule for 2600net
max_sessions_per_user   = 2

# Maximum NEW session creation attempts per desired_name per minute
# Resuming an existing session_id does not count against this limit
connect_rate_per_minute = 5

# Maximum NEW session creation attempts per desired_name per hour
connect_rate_per_hour   = 10
