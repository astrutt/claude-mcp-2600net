# ─────────────────────────────────────────────────────────────────────────────
# 2600net IRC MCP Server — Configuration
# Owner: root:claudebot   Permissions: 640
# ─────────────────────────────────────────────────────────────────────────────

[irc]
# IRC server to connect users to
server    = irc.scuttled.net
port      = 6697

# Email used when auto-registering user nicks with NickServ.
# Should be a real address — some Anope configs require email verification.
ns_email  = irc-mcp@2600.chat

[mcp]
# MCP server listens on localhost — Apache reverse proxies HTTPS to it
host      = 127.0.0.1
port      = 8765
public_host = wpm.2600.chat

[sessions]
# Hours before an idle session is disconnected (nick stays registered)
idle_timeout_hours = 4

[limits]
# Global maximum concurrent IRC sessions
max_sessions_global     = 100

# Maximum concurrent sessions per source identity
# (MCP has no auth yet so this is per-session_id prefix — will be per-user with OAuth)
max_sessions_per_user   = 2

# irc_connect calls allowed per minute per source
connect_rate_per_minute = 5

# irc_connect calls allowed per hour per source  
connect_rate_per_hour   = 10

