# ─────────────────────────────────────────────────────────────────────────────
# Apache reverse proxy for 2600net IRC MCP Server
# Add this inside your existing VirtualHost block for wpm.2600.chat (port 443)
#
# Required Apache modules:
#   sudo a2enmod proxy proxy_http headers
#   sudo systemctl reload apache2
# ─────────────────────────────────────────────────────────────────────────────

    # ── MCP Server ────────────────────────────────────────────────────────────
    ProxyPreserveHost On

    # Route /mcp to the local MCP server
    ProxyPass        /mcp  http://127.0.0.1:8765/mcp
    ProxyPassReverse /mcp  http://127.0.0.1:8765/mcp

    # CORS headers for browser-based MCP clients.
    # Desktop clients (Claude Desktop, Cursor, Windsurf, etc.) are unaffected.
    #
    # To allow only Claude.ai (default, recommended during Anthropic audit):
    #   cors_origins = https://claude.ai          (in mcp_server.ini)
    #
    # To allow multiple browser clients:
    #   cors_origins = https://claude.ai, https://other-client.example.com
    #
    # To allow all origins (open to any browser-based MCP client):
    #   cors_origins = *
    #
    # NOTE: Update the Access-Control-Allow-Origin header below to match
    # your cors_origins setting in mcp_server.ini. Apache requires a static
    # value here — use * for open access or the specific domain for restricted.
    <Location /mcp>
        RequestHeader set X-Forwarded-Proto "https"

        # Set to match cors_origins in mcp_server.ini
        Header always set Access-Control-Allow-Origin  "https://claude.ai"
        Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Accept, Mcp-Session-Id"

        # Handle CORS preflight
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^ - [R=204,L]
    </Location>
    # ── End MCP Server ────────────────────────────────────────────────────────
